<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} — Slanted Stone Chalet</title>
<meta name="description" content="{{ description }}">
<meta property="og:title" content="{{ title }} — Slanted Stone Chalet">
<meta property="og:description" content="{{ description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="https://slantedstone.com{{ page.url }}">
<meta property="og:image" content="https://slantedstone.com/images/Hero front house.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://slantedstone.com{{ page.url }}">
<meta name="theme-color" content="#1C1A17">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#F4EDE0;--cream2:#EDE4D0;--cream3:#E5D9C4;
  --ink:#1C1A17;--ink2:#3A3630;--muted:#8A8070;
  --gold:#B8955A;--gold2:#C9A96E;--white:#FDFAF5;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:1rem 5%;background:rgba(244,237,224,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(28,26,23,.08)}
.nav-logo{font-family:var(--sans);font-size:.8rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);transition:color .3s}
.nav-logo span{font-family:var(--serif);font-weight:400;letter-spacing:.05em;text-transform:none;font-size:1rem;margin-left:.3rem}
.nav-links{display:flex;gap:2.2rem;list-style:none;align-items:center}
.nav-links a{font-size:.7rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);transition:color .2s}
.nav-links a:hover{color:var(--gold2)}
.nav-book{background:var(--ink)!important;color:var(--white)!important;padding:.6rem 1.5rem;border-radius:2px;transition:background .2s!important}
.nav-book:hover{background:var(--ink2)!important}

.blog-hero{position:relative;height:340px;margin-top:60px;overflow:hidden;display:flex;align-items:center;justify-content:center;text-align:center}
.blog-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.blog-hero::after{content:'';position:absolute;inset:0;background:rgba(28,26,23,.45)}
.blog-hero-content{position:relative;z-index:1;padding:0 5%}
.blog-hero-content h1{font-family:var(--serif);font-size:2.8rem;font-weight:400;line-height:1.2;margin-bottom:.5rem;color:var(--white)}
.blog-hero-content p{font-size:1rem;color:rgba(253,250,245,.75);line-height:1.7}
.blog-body{max-width:720px;margin:0 auto;padding:2rem 5% 5rem}
.blog-body a.post-card{color:inherit;border-bottom:none}
.back-link{display:inline-block;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:2rem}
.back-link:hover{color:var(--gold2)}

.blog-cta{background:var(--cream2);padding:3rem;border-radius:4px;text-align:center;margin:3rem 0}
.blog-cta h3{font-family:var(--serif);font-size:1.5rem;font-weight:400;margin-bottom:.75rem}
.blog-cta p{font-size:.9rem;color:var(--muted);margin-bottom:1.5rem}
.btn-gold{display:inline-block;background:var(--gold);color:var(--white);font-size:.72rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:.85rem 2rem;border-radius:2px;transition:background .2s;border:none}
.btn-gold:hover{background:var(--gold2);color:var(--white)}

.container{max-width:1140px;margin:0 auto;padding:0 5%}
footer{background:var(--ink);color:rgba(253,250,245,.5);padding:3rem 0 2rem}
.footer-bottom{font-size:.75rem;text-align:center}

@media(max-width:600px){
  .nav-links{display:none}
  .blog-hero-content h1{font-size:1.8rem}
  .blog-hero{height:260px}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">SLANTED STONE <span>Chalet</span></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/blog/">Blog</a></li>
    <li><a href="https://www.bookeddirectly.com/g/pocono-pines/pocono-retreat%253A-finnish-barrel-sauna%252C-hot-tub-%2526-arcade/c72709" target="_blank" class="nav-book">Book Now</a></li>
  </ul>
</nav>

<div class="blog-hero">
  <img src="/images/blog-header.jpg" alt="Bushkill Falls in the Pocono Mountains">
  <div class="blog-hero-content">
    <h1>{{ title }}</h1>
    <p>{{ description }}</p>
  </div>
</div>

<div class="blog-body">
  <a href="/" class="back-link">← Home</a>
  {{ content }}

  <div class="blog-cta">
    <h3>Plan Your Pocono Pines Getaway</h3>
    <p>Stay at Slanted Stone Chalet — book direct and save 10%.</p>
    <a href="https://www.bookeddirectly.com/g/pocono-pines/pocono-retreat%253A-finnish-barrel-sauna%252C-hot-tub-%2526-arcade/c72709" target="_blank" class="btn-gold">Check Availability</a>
  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-bottom">
      <span>2026 Slanted Stone Chalet. All rights reserved.</span>
    </div>
  </div>
</footer>

</body>
</html>
