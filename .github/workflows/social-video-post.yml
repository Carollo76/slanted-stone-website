name: Social Media Video Post

on:
  schedule:
    # Mon, Wed, Fri at 10am ET (2pm UTC)
    - cron: '0 14 * * 1,3,5'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode: generate video but skip FB/IG posting (Slack still notified)'
        type: boolean
        required: false
        default: false

jobs:
  create-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate video (multi-model routing)
        id: video
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/social_video_generate.py

      - name: Add ambient audio to video
        if: steps.video.outputs.video_url != ''
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg > /dev/null 2>&1
          MOOD="${{ steps.video.outputs.audio_mood }}"
          echo "Adding ${MOOD} ambient audio..."

          case "$MOOD" in
            fireplace)
              ffmpeg -f lavfi -i "anoisesrc=d=3:c=brown:r=44100:a=0.08" \
                -af "lowpass=f=400,highpass=f=50,tremolo=f=8:d=0.4,volume=1.5" \
                -t 3 /tmp/ambient_short.wav -y 2>/dev/null
              ;;
            forest)
              ffmpeg -f lavfi -i "anoisesrc=d=3:c=pink:r=44100:a=0.05" \
                -af "lowpass=f=3000,highpass=f=200,tremolo=f=2:d=0.3" \
                -t 3 /tmp/ambient_short.wav -y 2>/dev/null
              ;;
            rain)
              ffmpeg -f lavfi -i "anoisesrc=d=3:c=pink:r=44100:a=0.1" \
                -af "bandpass=f=1000:w=800,volume=0.8" \
                -t 3 /tmp/ambient_short.wav -y 2>/dev/null
              ;;
            evening)
              ffmpeg -f lavfi -i "anoisesrc=d=3:c=pink:r=44100:a=0.03" \
                -af "lowpass=f=2000,highpass=f=100,tremolo=f=0.5:d=0.2" \
                -t 3 /tmp/ambient_short.wav -y 2>/dev/null
              ;;
            *)
              ffmpeg -f lavfi -i "anoisesrc=d=3:c=pink:r=44100:a=0.06" \
                -af "lowpass=f=600,highpass=f=80" \
                -t 3 /tmp/ambient_short.wav -y 2>/dev/null
              ;;
          esac

          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 /tmp/video.mp4 | cut -d. -f1)
          echo "Video duration: ${DURATION}s"

          ffmpeg -stream_loop -1 -i /tmp/ambient_short.wav -t ${DURATION} /tmp/ambient.wav -y 2>/dev/null
          ffmpeg -i /tmp/ambient.wav -af "afade=t=in:st=0:d=1,afade=t=out:st=$((DURATION-1)):d=1" /tmp/ambient_faded.wav -y 2>/dev/null
          ffmpeg -i /tmp/video.mp4 -i /tmp/ambient_faded.wav \
            -c:v copy -c:a aac -b:a 128k -shortest \
            /tmp/video_with_audio.mp4 -y 2>/dev/null
          mv /tmp/video_with_audio.mp4 /tmp/video.mp4
          echo "Audio added successfully"

      - name: Post video to Facebook
        if: steps.video.outputs.video_url != '' && inputs.test_mode != true
        env:
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: |
          CAPTION=$(cat /tmp/fb_caption.txt)
          RESPONSE=$(curl -s -X POST "https://graph.facebook.com/v25.0/${FB_PAGE_ID}/videos" \
            -F "source=@/tmp/video.mp4" \
            -F "description=$(echo "$CAPTION")" \
            -F "access_token=${FB_PAGE_ACCESS_TOKEN}")
          echo "Facebook response: $RESPONSE"
          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "Warning: Facebook video post failed"
            echo "$RESPONSE" | jq '.error'
          else
            echo "Posted video to Facebook: $(echo "$RESPONSE" | jq -r '.id')"
          fi

      - name: Post video to Instagram as Reel
        if: steps.video.outputs.video_url != '' && inputs.test_mode != true
        env:
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
        run: |
          IG_CAPTION=$(cat /tmp/ig_caption.txt)
          FILE_SIZE=$(stat -c%s /tmp/video.mp4)

          RESPONSE=$(curl -s -X POST "https://graph.facebook.com/v25.0/${IG_ACCOUNT_ID}/media" \
            -H "Content-Type: application/json" \
            -d "{
              \"media_type\": \"REELS\",
              \"upload_type\": \"resumable\",
              \"caption\": $(echo "$IG_CAPTION" | jq -Rs .),
              \"access_token\": \"${FB_PAGE_ACCESS_TOKEN}\"
            }")
          echo "Instagram container response: $RESPONSE"
          CONTAINER_ID=$(echo "$RESPONSE" | jq -r '.id')

          if [ "$CONTAINER_ID" = "null" ] || [ -z "$CONTAINER_ID" ]; then
            echo "Warning: Instagram container creation failed"
            echo "$RESPONSE" | jq '.error'
          else
            echo "Uploading video file (${FILE_SIZE} bytes)..."
            UPLOAD_RESPONSE=$(curl -s -X POST \
              "https://rupload.facebook.com/ig-api-upload/v25.0/${CONTAINER_ID}" \
              -H "Authorization: OAuth ${FB_PAGE_ACCESS_TOKEN}" \
              -H "offset: 0" \
              -H "file_size: ${FILE_SIZE}" \
              --data-binary "@/tmp/video.mp4")
            echo "Upload response: $UPLOAD_RESPONSE"

            echo "Waiting for Instagram to process video..."
            for i in $(seq 1 10); do
              sleep 30
              STATUS_RESPONSE=$(curl -s "https://graph.facebook.com/v25.0/${CONTAINER_ID}?fields=status_code&access_token=${FB_PAGE_ACCESS_TOKEN}")
              STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status_code')
              echo "Poll ${i}: ${STATUS}"
              if [ "$STATUS" = "FINISHED" ]; then break
              elif [ "$STATUS" = "ERROR" ]; then
                echo "Video processing failed"
                echo "$STATUS_RESPONSE" | jq '.'
                break
              fi
            done

            if [ "$STATUS" = "FINISHED" ]; then
              PUB_RESPONSE=$(curl -s -X POST "https://graph.facebook.com/v25.0/${IG_ACCOUNT_ID}/media_publish" \
                -H "Content-Type: application/json" \
                -d "{
                  \"creation_id\": \"${CONTAINER_ID}\",
                  \"access_token\": \"${FB_PAGE_ACCESS_TOKEN}\"
                }")
              echo "Instagram publish response: $PUB_RESPONSE"
              if echo "$PUB_RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
                echo "Warning: Instagram publish failed"
                echo "$PUB_RESPONSE" | jq '.error'
              else
                echo "Posted to Instagram: $(echo "$PUB_RESPONSE" | jq -r '.id')"
              fi
            else
              echo "Warning: Instagram video processing did not finish in time"
            fi
          fi

      - name: Send to Slack
        if: steps.video.outputs.video_url != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_SOCIAL }}
        run: |
          VIDEO_URL="${{ steps.video.outputs.video_url }}"
          IG_CAPTION=$(cat /tmp/ig_caption.txt)
          GBP_CAPTION=$(cat /tmp/gbp_caption.txt)
          FB_CAPTION=$(cat /tmp/fb_caption.txt)
          PHOTO="${{ steps.video.outputs.photo }}"
          FORMAT="${{ steps.video.outputs.format }}"
          MODEL="${{ steps.video.outputs.model }}"

          jq -n \
            --arg video "$VIDEO_URL" \
            --arg fb "$FB_CAPTION" \
            --arg ig "$IG_CAPTION" \
            --arg gbp "$GBP_CAPTION" \
            --arg photo "$PHOTO" \
            --arg format "$FORMAT" \
            --arg model "$MODEL" \
            '{
              "blocks": [
                {"type": "header", "text": {"type": "plain_text", "text": "Social Media Video Ready"}},
                {"type": "section", "text": {"type": "mrkdwn", "text": ("*Format:* " + $format + "\n*Model:* " + $model + "\n*Photo:* " + $photo + "\n*Video:* " + $video)}},
                {"type": "divider"},
                {"type": "section", "text": {"type": "mrkdwn", "text": ("*Facebook (auto-posted):*\n" + $fb)}},
                {"type": "divider"},
                {"type": "section", "text": {"type": "mrkdwn", "text": ("*Instagram (auto-posted as Reel):*\n" + $ig)}},
                {"type": "divider"},
                {"type": "section", "text": {"type": "mrkdwn", "text": ("*Google Business Profile (post manually):*\n" + $gbp + "\n\n<https://business.google.com/posts|Open GBP Posts>")}}
              ]
            }' | curl -s -X POST "$SLACK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d @-
